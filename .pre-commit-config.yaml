repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json
        pass_filenames: false
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --config-file=mypy.ini .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      # Architectural import-boundary enforcement. Disabled by default: a fresh
      # project has no architecture to constrain yet. Add an `.importlinter`
      # contract and `import-linter` dev dependency, then uncomment to enable.
      # - id: import-linter
      #   name: import-linter
      #   entry: uv run lint-imports
      #   language: system
      #   pass_filenames: false
      #   always_run: true

      - id: module-size
        name: module-size (500 lines)
        entry: >-
          bash -c 'v=0; for f in $(find src -name "*.py" -not -path "*/__pycache__/*");
          do n=$(wc -l < "$f"); if [ "$n" -gt 500 ]; then echo "$f: $n lines (>500)"; v=1; fi; done; exit $v'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest (unit)
        entry: uv run pytest
        language: system
        types: [python]
        args: [-m, unit]
        pass_filenames: false
        always_run: true

      - id: pytest-integration
        name: pytest (integration)
        # Exit code 5 (no tests collected) is treated as success so the hook
        # passes on projects that have no integration tests yet.
        entry: >-
          bash -c 'uv run pytest -m integration; c=$?; [ "$c" -eq 5 ] && exit 0; exit $c'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - --force-scope
          - --scopes
          - your_package,deps,repo
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
